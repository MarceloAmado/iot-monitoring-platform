# ============================================================
# Mosquitto MQTT Broker - Configuración DESARROLLO (Fase 1.3)
# ============================================================
# Fecha: 2025-11-08
# Versión: 2.0
# Propósito: Broker MQTT para telemetría de dispositivos ESP32
# NOTA: Esta configuración es para DESARROLLO/TESTING
#       En Fase 1.4 se implementará autenticación con auth plugin

# ============================================================
# Configuración General
# ============================================================
# FASE 1.4: Autenticación habilitada
# Usuarios autenticados via password_file y ACLs
allow_anonymous false

# Archivo de passwords (hashes SHA512)
password_file /mosquitto/config/passwords.txt

# Archivo de ACL (Access Control Lists)
acl_file /mosquitto/config/acl.txt

# ============================================================
# Persistencia de Datos
# ============================================================
# Guardar mensajes retenidos y subscripciones en disco
persistence true
persistence_location /mosquitto/data/

# Intervalo de guardado automático (30 minutos)
autosave_interval 1800

# Archivo de persistencia
persistence_file mosquitto.db

# ============================================================
# Logging
# ============================================================
# Tipos de logs: error, warning, notice, information
log_type error
log_type warning
log_type notice
log_type information

# Destinos: archivo y consola
log_dest file /mosquitto/log/mosquitto.log
log_dest stdout

# Timestamps en logs
log_timestamp true
log_timestamp_format %Y-%m-%d %H:%M:%S

# ============================================================
# Listener 1: MQTT Nativo (Puerto 1883)
# ============================================================
# Puerto estándar MQTT sin encriptación (para ESP32 en intranet)
listener 1883

# Protocolo MQTT (v3.1.1 y v5 soportados)
protocol mqtt

# Número máximo de conexiones simultáneas
max_connections 1000

# ============================================================
# Listener 2: WebSocket (Puerto 9001)
# ============================================================
# Puerto WebSocket para frontend (navegadores)
listener 9001

# Protocolo WebSocket
protocol websockets

# ============================================================
# Quality of Service (QoS)
# ============================================================
# Máximo QoS permitido
# 0 = Fire and forget
# 1 = At least once (recomendado para IoT)
# 2 = Exactly once
max_qos 2

# Tamaño máximo de paquete (10 MB)
max_packet_size 10485760

# ============================================================
# Retención de Mensajes
# ============================================================
# Permitir mensajes retenidos (retain flag)
# Útil para último valor conocido de sensores
retain_available true

# Máximo de mensajes retenidos en cola
max_queued_messages 1000

# Tamaño máximo de cola por cliente (10 MB)
max_queued_bytes 10485760

# ============================================================
# Performance Tuning
# ============================================================
# Máximo de inflight messages (QoS > 0)
max_inflight_messages 20

# Intervalo de actualización de estadísticas del sistema ($SYS)
sys_interval 10

# ============================================================
# Notas de Configuración - FASE 1.3
# ============================================================
# - allow_anonymous=true es TEMPORAL para desarrollo
# - Backend valida API keys encriptadas en cada mensaje
# - En Fase 1.4:
#   * allow_anonymous=false
#   * password_file=/mosquitto/config/passwords.txt
#   * acl_file=/mosquitto/config/acl.txt
#   * auth_plugin para validar contra PostgreSQL
#
# - Esta configuración está optimizada para intranet
# - Para Internet, agregar listener TLS en puerto 8883
# - Revisar max_connections según cantidad de dispositivos
