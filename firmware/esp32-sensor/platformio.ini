; PlatformIO Project Configuration File
;
; Sistema de Monitoreo IoT - Firmware ESP32
; Build options: https://docs.platformio.org/page/projectconf.html

[platformio]
default_envs = esp32dev

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino

; Serial Monitor options
monitor_speed = 115200
monitor_filters = esp32_exception_decoder

; Build flags
build_flags =
    -DCORE_DEBUG_LEVEL=3
    -DCONFIG_ARDUHAL_LOG_COLORS

; Upload settings
upload_speed = 921600

; Library dependencies
lib_deps =
    ; WiFi Manager para Zero-Config
    tzapu/WiFiManager @ ^2.0.16-rc.2

    ; ArduinoJson para manejo de JSON
    bblanchon/ArduinoJson @ ^6.21.4

    ; Sensores
    paulstoffregen/OneWire @ ^2.3.7
    milesburton/DallasTemperature @ ^3.11.0
    adafruit/DHT sensor library @ ^1.4.4
    adafruit/Adafruit Unified Sensor @ ^1.1.14

    ; HTTP Client
    ; (Incluido en ESP32 core)

    ; OTA Updates
    ; (ArduinoOTA incluido en ESP32 core, no necesita librería externa)

; OTA (Over-The-Air) Updates
; Upload por cable USB (default)
upload_protocol = esptool

; Para subir por OTA local (espota), descomentar las 5 líneas siguientes
; (quitar el ';' inicial) y ajustar la IP del ESP32 en tu red.
; IMPORTANTE: mientras estén descomentadas pisan el upload_protocol=esptool
; de arriba y el upload por USB deja de funcionar.
; upload_protocol = espota
; upload_port = YOUR_ESP32_IP
; upload_flags =
;     --port=3232
;     --auth=CHANGE_ME_OTA_PASSWORD

[env:esp32dev_debug]
extends = env:esp32dev
build_type = debug
build_flags =
    ${env:esp32dev.build_flags}
    -DDEBUG=1
    -DENABLE_SERIAL_DEBUG=1

[env:esp32dev_release]
extends = env:esp32dev
build_type = release
build_flags =
    ${env:esp32dev.build_flags}
    -DCORE_DEBUG_LEVEL=0
    -Os  ; Optimizar para tamaño
